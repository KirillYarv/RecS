server {
    listen       80;
    server_name  localhost;
    access_log   /var/log/nginx/access.log;
    error_log    /var/log/nginx/error.log;

    # Путь к папке public вашего проекта Laravel
    # Используем кавычки из-за пробелов и кириллицы в пути
    root   /var/www/public;
    index  index.php index.html index.htm;

    location / {
        # Ключевая настройка для Laravel:
        # Если файл не найден, перенаправляем запрос на index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Настройка PHP
    location ~ \.php$ {
        try_files $uri = 404;
        # Важно: PHP-FPM обычно слушает порт 9000
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO $fastcgi_script_name;
    }
}
